<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var path = window.location.pathname;
        var search = window.location.search || "";
        var hash = window.location.hash || "";
        var segments = path.split("/").filter(Boolean);
        var hasRepoBase = segments.length > 1;
        var base = hasRepoBase ? "/" + segments[0] : "";
        var trimmed = hasRepoBase ? "/" + segments.slice(1).join("/") : path;
        var next = base + "/?redirect=" + encodeURIComponent(trimmed + search + hash);
        window.location.replace(next);
      })();
    </script>
  </head>
  <body></body>
</html>
