services:
  - type: web
    name: career-portal-backend
    env: docker
    rootDir: backend
    plan: free
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,https://lokesh15kl.github.io
      - key: SESSION_COOKIE_SAME_SITE
        value: None
      - key: SESSION_COOKIE_SECURE
        value: true
