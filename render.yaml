services:
  - type: web
    name: career-portal-api
    runtime: java
    plan: free
    buildCommand: "./backend/mvnw clean package -DskipTests=true"
    startCommand: "cd backend && java -jar target/full-project-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: PORT
        value: "8080"
      - key: JAVA_VERSION
        value: "17"
      - key: DATABASE_URL
        fromDatabase:
          name: career-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: career-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: career-db
          property: password
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: FRONTEND_ORIGINS
        value: "https://lokesh15kl.github.io/career-portal"

databases:
  - name: career-db
    engine: mysql
    version: "8.0"
