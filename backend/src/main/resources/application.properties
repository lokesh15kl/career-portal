spring.application.name=full-project
server.port=${PORT:8080}

# GMAIL SMTP CONFIG
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.devtools.restart.enabled=true
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# DATABASE CONFIG
spring.datasource.url=${JDBC_DATABASE_URL:${DATABASE_URL:jdbc:mysql://localhost:3306/career_db}}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

huggingface.api.key=${HUGGINGFACE_API_KEY:}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://lokesh15kl.github.io}
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:Lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}